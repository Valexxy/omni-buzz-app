name: 🛰️ OMNI-BUZZ GEO-SCOUT
on:
  schedule:
    - cron: '*/10 * * * *' # ⏱️ Auto-runs every 10 minutes
  workflow_dispatch:      # 🚀 Allows you to click "Run Workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install requests supabase groq

      - name: 🧠 Run Geo-Scout Intelligence
        env:
          # This connects your GitHub Secrets to the Python Script
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
        run: python image_scout.py

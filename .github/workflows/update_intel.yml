name: 🛰️ OMNI-BUZZ AUTO-SCOUT

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Fixes the Node.js 20/24 warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests feedparser groq beautifulsoup4 lxml

      - name: 🛡️ Run Intelligence Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # DEBUG: Show us exactly where we are and what files exist
          echo "Current Path: $(pwd)"
          echo "Contents of Root:"
          ls -F
          
          # Check if the scripts folder exists before running
          if [ -d "scripts" ]; then
            echo "✅ Scripts folder found. Running cleanup..."
            python scripts/cleanup.py || echo "⚠️ Cleanup failed or not found, moving to scout..."
            
            echo "🚀 Running Image Scout..."
            python scripts/image_scout.py
          else
            echo "❌ ERROR: 'scripts' folder not found in root! Check your repo structure."
            exit 1
          fi

      - name: ⚠️ Notify Telegram on Failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚨 *OMNI-BUZZ PIPELINE FAILURE*%0A%0A🛑 *Status:* Exit Code 1 (Check Logs)%0A🔗 [View Error Logs](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
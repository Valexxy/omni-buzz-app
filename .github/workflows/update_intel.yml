name: 🛰️ OMNI-BUZZ AUTO-SCOUT

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  intel_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # This fixes the Node.js 20/24 warning and future-proofs the runner
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # Removed 'cache: pip' to fix the "No file matched" error
          
      - name: 📦 Install Merchant-Grade Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests feedparser groq beautifulsoup4 lxml

      - name: 🛡️ Run Intelligence Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/cleanup.py
          python scripts/image_scout.py

      - name: ⚠️ Notify Telegram on Failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚨 *OMNI-BUZZ PIPELINE FAILURE*%0A%0A🛑 *Status:* Sync Failed%0A🔗 [View Error Logs](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
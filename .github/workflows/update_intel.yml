name: Hourly Intel Sync
on:
  schedule:
    - cron: '0 * * * *' # Automated run every 60 minutes
  workflow_dispatch: # Allows you to click "Run Workflow" manually for testing

jobs:
  intel_pipeline:
    runs-on: ubuntu-latest
    # Timeout after 15 mins to prevent infinite loops and save GitHub credits
    timeout-minutes: 15 

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs by caching libraries

      - name: 📦 Install Merchant-Grade Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests feedparser groq beautifulsoup4 lxml
          
      - name: 🛡️ Run Intelligence Pipeline
        env:
          # These must match the names in your GitHub Repo Settings > Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🧹 Starting Database Cleanup..."
          python scripts/cleanup.py
          
          echo "🛰️ Starting Deep Scrape & AI Synthesis..."
          python scripts/image_scout.py
          
      - name: ⚠️ Notify on Failure
        if: failure()
        run: |
          echo "The Intelligence Pipeline failed. Check logs for Supabase/Groq connectivity issues."
          # Optional: Add your Telegram alert script here to ping your phone if it fails